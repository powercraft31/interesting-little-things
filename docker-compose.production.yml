version: '3.8'

services:
  solfacil-bff:
    # Production reuses the already-running host Redis instead of trying to bind a new 6379.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://host.docker.internal:6379}
    depends_on:
      solfacil-db:
        condition: service_healthy
