version: '3.8'

services:
  solfacil-db:
    image: postgres:15-alpine
    container_name: solfacil-db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin_2026
      POSTGRES_DB: solfacil_vpp
    volumes:
      - solfacil_pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solfacil_vpp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solfacil

  solfacil-redis:
    image: redis:7-alpine
    container_name: solfacil-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - solfacil

  solfacil-bff:
    image: node:20-alpine
    container_name: solfacil-bff
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./frontend-v2:/app/frontend-v2
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NODE_ENV: production
      APP_DATABASE_URL: postgresql://solfacil_app:solfacil_vpp_2026@solfacil-db:5432/solfacil_vpp
      SERVICE_DATABASE_URL: postgresql://solfacil_service:solfacil_service_2026@solfacil-db:5432/solfacil_vpp
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://solfacil-redis:6379}
      # LEGACY_BROWSER_BEARER: ${LEGACY_BROWSER_BEARER:-false}  # Emergency-only rollback toggle
    depends_on:
      solfacil-db:
        condition: service_healthy
      solfacil-redis:
        condition: service_started
    command: sh -c "npm install --include=dev && npx tsc -p tsconfig.build.json && node dist/scripts/local-server.js"
    networks:
      - solfacil

  solfacil-m1:
    image: node:20-alpine
    container_name: solfacil-m1
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: production
      SERVICE_DATABASE_URL: postgresql://solfacil_service:solfacil_service_2026@127.0.0.1:5433/solfacil_vpp
      MQTT_CLIENT_SUFFIX: ${MQTT_CLIENT_SUFFIX}  # avoids MQTT clientId collision between local and EC2
    depends_on:
      solfacil-db:
        condition: service_healthy
    command: sh -c "npm install --include=dev && npx tsc -p tsconfig.build.json && node dist/scripts/run-m1-local.js"
    network_mode: host

volumes:
  solfacil_pgdata:
    driver: local

networks:
  solfacil:
    driver: bridge
