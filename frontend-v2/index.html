<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLFACIL VPP — Admin Portal</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css?v=1772944593">
  <link rel="stylesheet" href="css/base.css?v=1772944593">
  <link rel="stylesheet" href="css/layout.css?v=1772944593">
  <link rel="stylesheet" href="css/components.css?v=1772944593">
  <link rel="stylesheet" href="css/pages.css?v=1772944593">
</head>
<body data-theme="dark">
  <div class="app-shell">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">&#x26A1;</div>
        <span class="brand-text">SOLFACIL VPP</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="fleet">
          <span class="nav-icon">&#x1F4CA;</span>
          <span class="nav-label">Fleet</span>
        </div>
        <div class="nav-item" data-page="devices">
          <span class="nav-icon">&#x1F50C;</span>
          <span class="nav-label">Devices</span>
        </div>
        <div class="nav-item" data-page="energy">
          <span class="nav-icon">&#x26A1;</span>
          <span class="nav-label">Energy</span>
        </div>
        <div class="nav-item" data-page="hems">
          <span class="nav-icon">&#x2699;&#xFE0F;</span>
          <span class="nav-label">HEMS</span>
        </div>
        <div class="nav-item" data-page="vpp">
          <span class="nav-icon">&#x1F50B;</span>
          <span class="nav-label">VPP</span>
        </div>
        <div class="nav-item" data-page="alerts">
          <span class="nav-icon">&#x1F514;</span>
          <span class="nav-label">Alerts</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="role-switcher">
          <label>Role</label>
          <select id="role-select">
            <option value="admin">SOLFACIL Admin</option>
            <option value="integrador">Integrador</option>
          </select>
        </div>
        <button class="sidebar-logout-btn" id="btn-logout" type="button">
          <span class="nav-icon">&#x1F6AA;</span>
          <span class="nav-label">Logout</span>
        </button>
      </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">
      <!-- Top Bar -->
      <div class="top-bar">
        <button class="hamburger-btn" id="btn-sidebar-toggle" type="button">&#x2630;</button>
        <h1 id="page-title" class="page-title">Fleet Overview</h1>
        <div class="top-bar-right">
          <select id="lang-switcher" class="lang-switcher">
            <option value="pt-BR">&#x1F1E7;&#x1F1F7; PT</option>
            <option value="en">&#x1F1FA;&#x1F1F8; EN</option>
            <option value="zh-CN">&#x1F1E8;&#x1F1F3; &#x4E2D;&#x6587;</option>
          </select>
          <span id="role-badge" class="role-badge role-badge-admin">SOLFACIL Admin</span>
        </div>
      </div>

      <!-- ===== PAGE: Fleet Overview ===== -->
      <section id="page-fleet" class="page-section active">
        <div class="page-content" id="fleet-content">
          <!-- Rendered by p1-fleet.js -->
        </div>
      </section>

      <!-- ===== PAGE: Devices ===== -->
      <section id="page-devices" class="page-section">
        <div class="page-content" id="devices-content"></div>
      </section>

      <!-- ===== PAGE: Energy ===== -->
      <section id="page-energy" class="page-section">
        <div class="page-content" id="energy-content"></div>
      </section>

      <!-- ===== PAGE: HEMS ===== -->
      <section id="page-hems" class="page-section">
        <div class="page-content" id="hems-content"></div>
      </section>

      <!-- ===== PAGE: VPP ===== -->
      <section id="page-vpp" class="page-section">
        <div class="page-content" id="vpp-content"></div>
      </section>

      <!-- ===== PAGE: Alerts ===== -->
      <section id="page-alerts" class="page-section">
        <div class="page-content" id="alerts-content"></div>
      </section>

      <!-- ===== PAGE: Performance ===== -->
      <section id="page-performance" class="page-section">
        <div class="page-content" id="performance-content"></div>
      </section>

    </main>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <!-- ECharts 5.x (self-hosted) -->
  <script src="js/vendor/echarts.min.js"></script>

  <!-- App JS (order matters: config → mock-data → data-source → ...) -->
  <script src="js/mock-data.js?v=1772944593"></script>
  <script src="js/config.js?v=1772944593"></script>
  <script src="js/data-source.js?v=1772944593"></script>
  <script src="js/i18n.js?v=1772944593"></script>
  <script src="js/components.js?v=1772944593"></script>
  <script src="js/charts.js?v=1772944593"></script>
  <script src="js/p1-fleet.js?v=1772944593"></script>
  <script src="js/p2-devices.js?v=1772944593"></script>
  <script src="js/p3-energy.js?v=1772944593"></script>
  <script src="js/p3-asset-energy.js?v=1772944593"></script>
  <script src="js/p3-asset-health.js?v=1772944593"></script>
  <script src="js/p4-hems.js?v=1772944593"></script>
  <script src="js/p5-strategy.js?v=1772944593"></script>
  <script src="js/p6-alerts.js?v=1772944593"></script>
  <script src="js/app.js?v=1772944593"></script>
</body>
</html>
